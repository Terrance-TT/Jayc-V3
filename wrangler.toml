#:schema node_modules/wrangler/config-schema.json
name = "bolt"
compatibility_flags = ["nodejs_compat"]
compatibility_date = "2024-07-01"
pages_build_output_dir = "./build/client"

# ── Cloudflare D1 (server-side chat history sync) ──────────────────
# Database: jayc-chats — schema applied with:
#   npx wrangler d1 execute jayc-chats --remote --file=migrations/0001_create_chats.sql
#
# Note: the earlier "Error 8000022: Invalid database UUID" deploy failure
# was caused by a half-provisioned database (since deleted), not by this
# config. The dashboard bindings UI is read-only for this project because
# this file is the source of truth — manage the binding here.
[[d1_databases]]
binding = "DB"
database_name = "jayc-chats"
database_id = "ab589541-11fb-4330-8986-f271f356a348"
migrations_dir = "migrations"
